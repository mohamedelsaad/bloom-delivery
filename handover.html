<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Bloom — Handover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bloom:#b22025; --bloom-dark:#8b191d; --bloom-light:#fdf2f2;
      --bg:#f6f6f8; --surface:#ffffff; --border:#e5e7eb;
      --text:#1a1a2e; --muted:#6b7280;
      --success:#16a34a; --error:#dc2626; --info:#2563eb; --warning:#d97706;
      --radius:12px; --radius-lg:20px; --radius-full:100px;
      --shadow:0 2px 12px rgba(0,0,0,0.07); --shadow-md:0 4px 20px rgba(0,0,0,0.10);
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:60px; -webkit-tap-highlight-color:transparent; }
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card { background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); padding:40px 32px; width:100%; max-width:380px; text-align:center; }
    .login-logo-wrap { margin:0 auto 20px; }
    .login-logo-img { width:160px; height:auto; object-fit:contain; }
    .login-card h1 { font-family:'Sora',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
    .login-card p { color:var(--muted); font-size:14px; margin-bottom:28px; }
    .pin-input { width:100%; padding:16px; font-size:24px; letter-spacing:8px; text-align:center; border:2px solid var(--border); border-radius:var(--radius-full); outline:none; font-family:'Sora',sans-serif; transition:border-color .2s; }
    .pin-input:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.10); }
    .btn-primary { width:100%; padding:16px; background:var(--bloom); color:#fff; border:none; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-top:14px; box-shadow:0 4px 16px rgba(178,32,37,.25); transition:background .2s; }
    .btn-primary:hover { background:var(--bloom-dark); }
    .error-msg { color:var(--error); font-size:13px; margin-top:12px; display:none; font-weight:500; }
    #main-app { display:none; }
    .top-bar { background:var(--surface); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow); position:sticky; top:0; z-index:100; }
    .top-bar-left { display:flex; align-items:center; gap:10px; }
    .top-bar-logo { width:40px; height:40px; display:flex; align-items:center; justify-content:center; }
    .top-bar-user { font-family:'Sora',sans-serif; font-size:14px; font-weight:600; }
    .top-bar-store { font-size:12px; color:var(--muted); }
    .top-bar-user-sub { font-size:11px; color:var(--bloom); font-weight:600; margin-top:1px; }
    .btn-logout { padding:8px 16px; background:transparent; border:1.5px solid var(--border); border-radius:var(--radius-full); font-size:13px; color:var(--muted); cursor:pointer; transition:border-color .2s,color .2s; }
    .btn-logout:hover { border-color:var(--error); color:var(--error); }
    .tabs { display:flex; gap:6px; padding:16px 16px 0; max-width:640px; margin:0 auto; }
    .tab-btn { flex:1; padding:12px; border:none; border-radius:var(--radius) var(--radius) 0 0; background:var(--surface); color:var(--muted); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; opacity:.6; }
    .tab-btn.active { opacity:1; color:var(--bloom); border-bottom:2px solid var(--bloom); }
    .container { max-width:640px; margin:0 auto; padding:0 16px 16px; }
    .card { background:var(--surface); border-radius:0 0 var(--radius-lg) var(--radius-lg); box-shadow:var(--shadow); padding:20px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
    .field select { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; font-family:'DM Sans',sans-serif; color:var(--text); background:var(--surface); outline:none; appearance:none; transition:border-color .2s; }
    .field select:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.08); }
    .divider { display:flex; align-items:center; gap:10px; margin:18px 0 16px; }
    .divider span { font-size:12px; color:var(--muted); white-space:nowrap; font-weight:500; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .add-order-panel { background:var(--bg); border-radius:var(--radius-lg); border:1.5px solid var(--border); padding:16px; margin-bottom:18px; }
    .scanner-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#111; border-radius:var(--radius); overflow:hidden; margin-bottom:12px; display:none; }
    #video-feed { width:100%; height:100%; object-fit:cover; display:block; }
    .scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .scan-box { width:72%; height:44%; border:2px solid var(--bloom); border-radius:var(--radius); box-shadow:0 0 0 9999px rgba(0,0,0,.52); position:relative; overflow:hidden; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:var(--bloom); animation:scanAnim 2s ease-in-out infinite; }
    @keyframes scanAnim { 0%,100%{top:8%} 50%{top:88%} }
    .order-input-row { display:flex; gap:8px; margin-bottom:14px; align-items:center; }
    .order-id-input { flex:1; padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; background:var(--surface); height:48px; transition:border-color .2s; }
    .order-id-input:focus { border-color:var(--bloom); box-shadow:0 0 0 3px rgba(178,32,37,.08); }
    .order-id-input.scanned { border-color:var(--success); background:#f0fdf4; font-weight:600; color:#15803d; }
    .btn-row-3 { display:flex; gap:8px; }
    .btn-cam { flex:1; height:44px; background:var(--text); color:#fff; border:none; border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; transition:background .2s; }
    .btn-cam::after { content:'Scan'; }
    .btn-cam svg { width:18px; height:18px; flex-shrink:0; }
    .btn-cam.cam-on { background:var(--bloom); }
    .btn-flash { flex:1; height:44px; background:var(--surface); color:var(--muted); border:1.5px solid var(--border); border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; opacity:.35; pointer-events:none; transition:background .2s; }
    .btn-flash::after { content:'Flash'; }
    .btn-flash svg { width:16px; height:16px; }
    .btn-flash.visible { opacity:1; pointer-events:auto; }
    .btn-flash.on { background:#fef3c7; border-color:#f59e0b; color:#92400e; }
    .btn-clear-input { flex:1; height:44px; background:#fee2e2; color:var(--error); border:1.5px solid #fca5a5; border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Sora',sans-serif; font-size:13px; font-weight:600; transition:background .2s; }
    .btn-clear-input::after { content:'Clear'; }
    .btn-clear-input svg { width:16px; height:16px; }
    .btn-clear-input:hover { background:#fecaca; }
    .zone-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .zone-picker { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
    .zone-pick-btn { padding:10px 4px; border:2px solid; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:12px; font-weight:700; cursor:pointer; text-align:center; line-height:1.3; transition:all .15s; }
    /* Zone 1 — Blue */
    .zone-pick-btn.z1 { background:#eff6ff; border-color:#93c5fd; color:#1d4ed8; }
    .zone-pick-btn.z1.sel { background:#bfdbfe; border-color:#3b82f6; color:#1e40af; box-shadow:0 0 0 3px rgba(59,130,246,.25); }
    /* Zone 2 — Green */
    .zone-pick-btn.z2 { background:#f0fdf4; border-color:#86efac; color:#15803d; }
    .zone-pick-btn.z2.sel { background:#bbf7d0; border-color:#22c55e; color:#065f46; box-shadow:0 0 0 3px rgba(34,197,94,.25); }
    /* Zone 3 — Amber */
    .zone-pick-btn.z3 { background:#fffbeb; border-color:#fcd34d; color:#b45309; }
    .zone-pick-btn.z3.sel { background:#fde68a; border-color:#f59e0b; color:#78350f; box-shadow:0 0 0 3px rgba(245,158,11,.25); }
    /* Zone 4 — Pink */
    .zone-pick-btn.z4 { background:#fdf2f8; border-color:#f9a8d4; color:#be185d; }
    .zone-pick-btn.z4.sel { background:#fbcfe8; border-color:#ec4899; color:#9d174d; box-shadow:0 0 0 3px rgba(236,72,153,.25); }
    /* Free Zone — Gray */
    .zone-pick-btn.zf { background:#f9fafb; border-color:#d1d5db; color:#4b5563; }
    .zone-pick-btn.zf.sel { background:#e5e7eb; border-color:#6b7280; color:#374151; box-shadow:0 0 0 3px rgba(107,114,128,.25); }
    .free-zone-full-row { display:flex; gap:8px; align-items:center; margin-top:7px; margin-bottom:8px; }
    .btn-free-zone { padding:10px 16px; flex-shrink:0; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--surface); font-family:'Sora',sans-serif; font-size:12px; font-weight:600; cursor:pointer; color:var(--muted); white-space:nowrap; transition:all .15s; }
    .btn-free-zone.zf.sel { background:#f3f4f6; border-color:#6b7280; color:#374151; }
    .free-zone-row { display:none; gap:6px; align-items:center; flex:1; }
    .free-zone-row.show { display:flex; }
    .free-zone-price { width:90px; padding:8px 10px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; font-weight:700; font-family:'Sora',sans-serif; outline:none; text-align:center; transition:border-color .2s; }
    .free-zone-price:focus { border-color:var(--bloom); }
    .free-zone-currency { font-size:13px; font-weight:700; color:var(--muted); flex-shrink:0; }
    .btn-add-order { width:100%; padding:14px; background:var(--bloom); color:#fff; border:none; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s; }
    .btn-add-order:hover { background:var(--bloom-dark); }
    .btn-add-order:disabled { background:var(--muted); cursor:not-allowed; }
    .list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .list-title { font-family:'Sora',sans-serif; font-size:14px; font-weight:600; }
    .count-badge { background:var(--bloom-light); color:var(--bloom); font-size:12px; font-weight:700; padding:2px 10px; border-radius:var(--radius-full); margin-right:4px; }
    .btn-clear { background:none; border:none; color:var(--error); font-size:13px; cursor:pointer; font-weight:500; }
    .order-list { max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .order-item { display:flex; justify-content:space-between; align-items:center; padding:11px 14px; background:var(--bg); border-radius:var(--radius); border:1px solid var(--border); animation:fadeIn .15s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .order-item-left { display:flex; flex-direction:column; gap:4px; }
    .order-item-id { font-size:14px; font-weight:600; font-family:monospace; }
    .zone-pill { display:inline-block; padding:2px 9px; border-radius:var(--radius-full); font-size:11px; font-weight:700; }
    .zp1{background:#bfdbfe;color:#1e40af;font-weight:700}
    .zp2{background:#bbf7d0;color:#065f46;font-weight:700}
    .zp3{background:#fde68a;color:#78350f;font-weight:700}
    .zp4{background:#fbcfe8;color:#9d174d;font-weight:700}
    .zpf{background:#e5e7eb;color:#374151;font-weight:700}
    .btn-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:0 4px; transition:color .2s; }
    .btn-remove:hover { color:var(--error); }
    .notes-input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; margin-bottom:16px; transition:border-color .2s; }
    .notes-input:focus { border-color:var(--bloom); }
    .btn-submit { width:100%; padding:18px; background:var(--success); color:#fff; border:none; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(22,163,74,.25); transition:background .2s; }
    .btn-submit:hover { background:#15803d; }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }
    .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .filter-grid input, .filter-grid select { width:100%; padding:11px 12px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:'DM Sans',sans-serif; outline:none; background:var(--surface); }
    .btn-search { padding:13px; background:var(--info); color:#fff; border:none; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-clear-history { padding:13px 16px; background:#f3f4f6; color:var(--muted); border:1.5px solid var(--border); border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .2s; }
    .btn-clear-history:hover { background:#e5e7eb; color:var(--error); border-color:var(--error); }
    .history-item { padding:13px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); border-left:4px solid var(--bloom); margin-bottom:8px; }
    .history-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .history-id { font-weight:700; font-size:14px; font-family:monospace; }
    .status-badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:var(--radius-full); }
    .s-handed{background:#dbeafe;color:#1e40af} .s-delivered{background:#d1fae5;color:#065f46} .s-returned{background:#fee2e2;color:#991b1b}
    .history-meta { font-size:12px; color:var(--muted); margin-top:5px; line-height:1.6; }
    .btn-delete-order { background:none; border:none; cursor:pointer; font-size:16px; padding:2px 4px; opacity:.6; transition:opacity .2s; }
    .btn-delete-order:hover { opacity:1; }
    .btn-delete-all-filtered { padding:8px 16px; background:#fee2e2; color:var(--error); border:1.5px solid #fca5a5; border-radius:var(--radius); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background .2s; }
    .btn-delete-all-filtered:hover { background:#fecaca; }
    .loader-overlay { position:fixed; inset:0; background:rgba(255,255,255,.88); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    .loader-overlay.show { display:flex; }
    .spinner { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--bloom); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loader-text { margin-top:14px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--muted); }
    .toast-wrap { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; width:90%; max-width:380px; }
    .toast { padding:13px 20px; border-radius:var(--radius-full); font-family:'Sora',sans-serif; font-size:13px; font-weight:600; color:#fff; text-align:center; animation:tIn .25s ease, tOut .3s ease 2.7s forwards; }
    .toast.success{background:var(--success)} .toast.error{background:var(--error)} .toast.info{background:var(--info)} .toast.warning{background:var(--warning)}
    @keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes tOut{to{opacity:0;transform:translateY(10px)}}
    .tab-panel { display:none; } .tab-panel.active { display:block; }
    .empty-state { text-align:center; padding:32px 16px; color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
<div class="loader-overlay" id="loader"><div class="spinner"></div><div class="loader-text" id="loader-text">Loading...</div></div>
<div class="toast-wrap" id="toast-wrap"></div>

          <button class="btn-search" id="btn-search" style="flex:1">Search Records</button>
          <button class="btn-clear-history" id="btn-clear-history" title="Clear results">✕ Clear</button>
        </div>
        </div>
        <div id="history-list"><div class="empty-state">Use filters to load records</div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, limit, runTransaction, setDoc, updateDoc, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ── Firebase init ─────────────────────────────────────────────────────────────
const app = initializeApp({
  apiKey: "AIzaSyC6dO6F02hlsZ9XKaNgmhHCeFJ0cwhfg6o",
  authDomain: "bloom-delivery-f9540.firebaseapp.com",
  projectId: "bloom-delivery-f9540",
  storageBucket: "bloom-delivery-f9540.firebasestorage.app",
  messagingSenderId: "409469512995",
  appId: "1:409469512995:web:74eb908a613f3f2c9a3096"
});
const db   = getFirestore(app);
const auth = getAuth(app);

// Sign in anonymously for Firestore access
await signInAnonymously(auth);

// ── State ─────────────────────────────────────────────────────────────────────
let session      = null;
let config       = null;
let orders       = [];
let selectedZone = '';
let codeReader   = null;
let currentStream= null;
let cameraOpen   = false;
let isFlashOn    = false;
let lastScanned  = '';
let lastScannedAt= 0;
let audioCtx     = null;

const ZONE_META = {
  zone_1:{pill:'zp1',btn:'z1'}, zone_2:{pill:'zp2',btn:'z2'},
  zone_3:{pill:'zp3',btn:'z3'}, zone_4:{pill:'zp4',btn:'z4'},
  free:  {pill:'zpf',btn:'zf'},
};

// Get zone meta by matching start of ID (handles "zone_1_store_01" format)
function getZoneMeta(zone_id) {
  if (zone_id === 'free') return ZONE_META.free;
  for (const key of Object.keys(ZONE_META)) {
    if (zone_id === key || zone_id.startsWith(key + '_') || zone_id.startsWith(key)) {
      return ZONE_META[key];
    }
  }
  return {pill:'zpf', btn:'zf'};
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = 1046; osc.type = 'sine';
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}
function vibrate() { try { if (navigator.vibrate) navigator.vibrate([60,30,40]); } catch(e) {} }

// ── Init ──────────────────────────────────────────────────────────────────────
// ── Attach all event listeners immediately (module is already loaded) ─────────
document.getElementById('unlock-btn').addEventListener('click', handleLogin);
document.getElementById('passcode-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('logout-btn').addEventListener('click', handleLogout);
document.getElementById('btn-cam').addEventListener('click', toggleCamera);
document.getElementById('btn-flash').addEventListener('click', toggleFlash);
document.getElementById('btn-add').addEventListener('click', addCurrentOrder);
document.getElementById('btn-clear').addEventListener('click', clearAll);
document.getElementById('btn-submit').addEventListener('click', submitHandover);
document.getElementById('btn-search').addEventListener('click', loadHistory);
  document.getElementById('btn-clear-history').addEventListener('click', function() {
    document.getElementById('history-list').innerHTML = '<div class="empty-state">Use filters to load records</div>';
    window._currentHistoryData = [];
  });
document.getElementById('btn-free-zone').addEventListener('click', function() { selectFreeZone(this); });
  document.getElementById('btn-clear-input').addEventListener('click', function() { var inp=document.getElementById('order-id-input'); inp.value=''; inp.classList.remove('scanned'); validateAddBtn(); inp.focus(); });
document.getElementById('order-id-input').addEventListener('input', function() { this.classList.remove('scanned'); validateAddBtn(); });
  document.getElementById('order-id-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('order-id-input').blur();
      setTimeout(addCurrentOrder, 150);
    }
  });
document.getElementById('free-zone-price').addEventListener('input', validateAddBtn);
document.getElementById('agent-select').addEventListener('change', validateSubmit);
document.getElementById('tab-scan-btn').addEventListener('click', function() { switchTab('scan', this); });
document.getElementById('tab-history-btn').addEventListener('click', function() { switchTab('history', this); loadHistory(); });

// ── Restore session ───────────────────────────────────────────────────────────
try {
  const saved = localStorage.getItem('bloom_hs');
  if (saved) { session = JSON.parse(saved); bootApp(); }
} catch(e) {}
try {
  const pending = localStorage.getItem('bloom_ho');
  if (pending) orders = JSON.parse(pending);
} catch(e) {}
const today = new Date().toISOString().split('T')[0];
document.getElementById('h-from').value = today;
document.getElementById('h-to').value   = today;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function handleLogin() {
  const passcode = document.getElementById('passcode-input').value.trim();
  if (!passcode) return;
  showLoader('Verifying...');
  try {
    const userDoc = await getDoc(doc(db, 'users', passcode));
    if (!userDoc.exists()) {
      hideLoader();
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('passcode-input').value = '';
      return;
    }
    const userData = userDoc.data();
    session = { passcode, username: userData.username, store_id: userData.store_id, role: userData.role };
    try { localStorage.setItem('bloom_hs', JSON.stringify(session)); } catch(e) {}
    document.getElementById('login-error').style.display = 'none';
    hideLoader();
    bootApp();
  } catch(e) {
    hideLoader();
    showToast('Connection error — try again', 'error');
  }
}

function handleLogout() {
  stopCamera();
  try { localStorage.removeItem('bloom_hs'); localStorage.removeItem('bloom_ho'); } catch(e) {}
  session = null; config = null; orders = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('passcode-input').value = '';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function bootApp() {
  showLoader('Loading config...');
  try {
    // Load agents for this store
    const agentsSnap = await getDocs(query(
      collection(db, 'agents'),
      where('store_id', '==', session.store_id),
      where('status', '==', 'active')
    ));
    const agents = agentsSnap.docs.map(d => ({ id: d.id, name: d.data().name }));

    // Load zones for this store
    const zonesSnap = await getDocs(query(
      collection(db, 'zones'),
      where('store_id', '==', session.store_id)
    ));
    const zones = zonesSnap.docs.map(d => ({
      id: d.id, name: d.data().name,
      price: d.data().price, sla_minutes: d.data().sla_minutes
    }));

    // Load store name
    const storeDoc = await getDoc(doc(db, 'stores', session.store_id));
    const storeName = storeDoc.exists() ? storeDoc.data().name : session.store_id;

    // Build agent name lookup map
    const agentMap = {};
    agents.forEach(a => { agentMap[a.id] = a.name; });
    config = { agents, zones, storeName, agentMap };
    buildZonePicker();
    populateDropdowns();

    document.getElementById('display-user').textContent  = session.username;
    document.getElementById('display-store').textContent = storeName;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display    = 'block';
    if (orders.length) renderOrders();
    hideLoader();
  } catch(e) {
    hideLoader();
    showToast('Failed to load config', 'error');
  }
}

// ── Zone picker ───────────────────────────────────────────────────────────────
function buildZonePicker() {
  const picker = document.getElementById('zone-picker');
  picker.innerHTML = '';
  (config.zones || []).forEach(z => {
    const m   = getZoneMeta(z.id);
    const btn = document.createElement('button');
    btn.className   = 'zone-pick-btn ' + m.btn;
    btn.dataset.zid = z.id;
    btn.innerHTML   = '<div>' + z.name + '</div><div style="font-size:11px;margin-top:3px;font-weight:700;opacity:.9">' + z.price + ' EGP</div>';
    btn.addEventListener('click', () => selectZone(z.id, btn));
    btn.dataset.cleanId = z.id;
    picker.appendChild(btn);
  });
}

function selectZone(zone_id, btn) {
  selectedZone = zone_id;
  document.querySelectorAll('.zone-pick-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('btn-free-zone').classList.remove('sel');
  document.getElementById('free-zone-row').classList.remove('show');
  btn.classList.add('sel');
  validateAddBtn();
}

function selectFreeZone(btn) {
  selectedZone = 'free';
  document.querySelectorAll('.zone-pick-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('free-zone-row').classList.add('show');
  document.getElementById('free-zone-price').focus();
  validateAddBtn();
}

function populateDropdowns() {
  const agentSel = document.getElementById('agent-select');
  agentSel.innerHTML = '<option value="">— Select agent —</option>';
  (config.agents || []).forEach(a => { agentSel.innerHTML += '<option value="' + a.id + '">' + a.name + '</option>'; });
  const hAgent = document.getElementById('h-agent');
  hAgent.innerHTML = '<option value="">All agents</option>';
  (config.agents || []).forEach(a => { hAgent.innerHTML += '<option value="' + a.id + '">' + a.name + '</option>'; });
  const hZone = document.getElementById('h-zone');
  hZone.innerHTML = '<option value="">All zones</option>';
  (config.zones || []).forEach(z => { hZone.innerHTML += '<option value="' + z.id + '">' + z.name + '</option>'; });
  hZone.innerHTML += '<option value="free">Free Zone</option>';
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name !== 'scan') stopCamera();
}

// ── Camera ────────────────────────────────────────────────────────────────────
function toggleCamera() {
  if (cameraOpen) { stopCamera(); return; }
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  codeReader = new ZXing.BrowserMultiFormatReader();
  const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
  codeReader.decodeFromConstraints(constraints, 'video-feed', (result) => {
    if (result) {
      const text = result.getText();
      const now  = Date.now();
      if (text === lastScanned && now - lastScannedAt < 800) return;
      lastScanned = text; lastScannedAt = now;
      handleScanResult(text);
    }
  });
  document.getElementById('scanner-wrap').style.display = 'block';
  document.getElementById('btn-cam').classList.add('cam-on');
  cameraOpen = true;
  navigator.mediaDevices.getUserMedia(constraints).then(stream => {
    currentStream = stream;
    const track = stream.getVideoTracks()[0];
    const caps  = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.torch) document.getElementById('btn-flash').classList.add('visible');
  }).catch(() => {});
}

function stopCamera() {
  try { if (codeReader) { codeReader.reset(); codeReader = null; } } catch(e) {}
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const v = document.getElementById('video-feed');
  if (v && v.srcObject) { try { v.srcObject.getTracks().forEach(t => t.stop()); } catch(e) {} v.srcObject = null; }
  document.getElementById('scanner-wrap').style.display = 'none';
  document.getElementById('btn-cam').classList.remove('cam-on');
  document.getElementById('btn-flash').classList.remove('visible', 'on');
  isFlashOn = false; cameraOpen = false;
}

function toggleFlash() {
  if (!currentStream) return;
  try {
    const track = currentStream.getVideoTracks()[0];
    isFlashOn = !isFlashOn;
    track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
    document.getElementById('btn-flash').classList.toggle('on', isFlashOn);
  } catch(e) { showToast('Flash not supported', 'info'); }
}

function handleScanResult(text) {
  const cleaned = text.trim();
  // Accept only numeric order IDs
  if (!/^\d+$/.test(cleaned)) {
    showToast('Invalid barcode — numbers only', 'warning');
    return;
  }
  vibrate(); beep();
  const inp = document.getElementById('order-id-input');
  inp.value = cleaned; inp.classList.add('scanned');
  validateAddBtn(); stopCamera();
}

// ── Add order ─────────────────────────────────────────────────────────────────
function validateAddBtn() {
  const id     = document.getElementById('order-id-input').value.trim();
  const fPrice = parseFloat(document.getElementById('free-zone-price').value) || 0;
  const zoneOk = selectedZone && (selectedZone !== 'free' || fPrice > 0);
  const numericOk = /^\d+$/.test(id);
  document.getElementById('btn-add').disabled = !id || !numericOk || !zoneOk;
}

function validateSubmit() {
  // Keep submit enabled as long as there are orders — agent check on click
  document.getElementById('btn-submit').disabled = orders.length === 0;
}

function addCurrentOrder() {
  const order_id   = document.getElementById('order-id-input').value.trim().substring(0, 64);
  const zone_id    = selectedZone;
  const free_price = zone_id === 'free' ? (parseFloat(document.getElementById('free-zone-price').value) || 0) : 0;
  if (!order_id) { showToast('Enter an Order ID', 'warning'); return; }
  if (!zone_id)  { showToast('Select a zone', 'warning'); return; }
  if (zone_id === 'free' && free_price <= 0) { showToast('Enter Free Zone price', 'warning'); return; }
  if (orders.find(o => o.order_id === order_id)) { showToast('Order already in list', 'warning'); return; }
  orders.push({ order_id, zone_id, free_price });
  try { localStorage.setItem('bloom_ho', JSON.stringify(orders)); } catch(e) {}
  renderOrders();
  showToast('Added ✓', 'success');
  document.getElementById('order-id-input').value = '';
  document.getElementById('order-id-input').classList.remove('scanned');
  validateAddBtn(); validateSubmit();
}

function getZoneLabel(o) {
  if (o.zone_id === 'free') return 'Free (' + o.free_price + ' EGP)';
  if (!config) return o.zone_id;
  const z = (config.zones || []).find(z => z.id === o.zone_id);
  return z ? z.name : o.zone_id;
}

function renderOrders() {
  const list = document.getElementById('order-list');
  document.getElementById('count').textContent = orders.length;
  if (!orders.length) { list.innerHTML = '<div class="empty-state">No orders added yet</div>'; validateSubmit(); return; }
  list.innerHTML = orders.slice().reverse().map((o, i) => {
    const realIdx = orders.length - 1 - i;
    const m = getZoneMeta(o.zone_id);
    const dupStyle = o.duplicate ? 'border-color:#dc2626;background:#fef2f2;' : '';
    const dupBadge = o.duplicate ? '<span style="font-size:10px;color:#dc2626;font-weight:700;margin-left:4px">⚠ DUPLICATE TODAY</span>' : '';
    return '<div class="order-item" style="' + dupStyle + '">' +
      '<div class="order-item-left">' +
        '<span class="order-item-id">' + o.order_id + '</span>' + dupBadge +
        '<span class="zone-pill ' + m.pill + '">' + getZoneLabel(o) + '</span>' +
      '</div>' +
      '<button class="btn-remove" data-idx="' + realIdx + '">×</button>' +
    '</div>';
  }).join('');
  list.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', function() { removeOrder(parseInt(this.dataset.idx)); });
  });
  validateSubmit();
}

function removeOrder(idx) {
  orders.splice(idx, 1);
  try { localStorage.setItem('bloom_ho', JSON.stringify(orders)); } catch(e) {}
  renderOrders();
}

function clearAll() {
  if (!orders.length) return;
  if (!confirm('Clear all orders?')) return;
  orders = []; try { localStorage.removeItem('bloom_ho'); } catch(e) {}
  renderOrders();
}

// ── Submit — uses Firestore transaction for duplicate prevention ───────────────
async function submitHandover() {
  const agent_id = document.getElementById('agent-select').value;
  const notes    = document.getElementById('notes-input').value.trim();
  if (!agent_id) { showToast('Please select a delivery agent first', 'warning'); return; }
  if (!orders.length) { showToast('Add at least one order first', 'warning'); return; }
  showLoader('Saving handover...');

  const ts        = new Date();
  const saved     = [];
  const duplicates= [];

  for (const o of orders) {
    const orderRef = doc(db, 'handover_log', o.order_id + '_' + today);
    try {
      // Duplicate check: same order on same calendar day only
      const today = new Date().toISOString().split('T')[0]; // "2026-05-02"
      const dayIndexRef = doc(db, 'order_index', o.order_id + '_' + today);

      await runTransaction(db, async tx => {
        const existing = await tx.get(dayIndexRef);
        if (existing.exists()) throw new Error('DUPLICATE');
        tx.set(dayIndexRef, { first_seen_ts: serverTimestamp(), store_id: session.store_id, date: today });
        tx.set(orderRef, {
          order_id:    o.order_id,
          store_id:    session.store_id,
          zone_id:     o.zone_id,
          free_price:  o.free_price || 0,
          agent_id:    agent_id,
          handover_by: session.username,
          handover_ts: serverTimestamp(),
          status:      'Handed Over',
          notes:       notes,
        });
      });
      saved.push(o.order_id);
    } catch(e) {
      duplicates.push(o.order_id);
    }
  }

  hideLoader();
  if (saved.length > 0) {
    const msg = duplicates.length
      ? 'Saved ' + saved.length + ' orders. ' + duplicates.length + ' duplicates skipped.'
      : saved.length + ' orders saved!';
    showToast(msg, 'success');
    orders = []; try { localStorage.removeItem('bloom_ho'); } catch(e) {}
    selectedZone = '';
    document.getElementById('agent-select').value = '';
    document.getElementById('order-id-input').value = '';
    document.getElementById('notes-input').value = '';
    document.getElementById('free-zone-price').value = '';
    document.getElementById('free-zone-row').classList.remove('show');
    document.querySelectorAll('.zone-pick-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById('btn-free-zone').classList.remove('sel');
    renderOrders(); stopCamera();
  } else {
    showToast('All orders already exist', 'warning');
  }
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  showLoader('Loading...');
  try {
    const from    = document.getElementById('h-from').value;
    const to      = document.getElementById('h-to').value;
    const agentId = document.getElementById('h-agent').value;
    const zoneId  = document.getElementById('h-zone').value;
    const search  = document.getElementById('h-search').value.trim();

    // Simple query — filter by store_id only, then filter client-side
    // (avoids needing composite Firestore indexes)
    const q = query(
      collection(db, 'handover_log'),
      where('store_id', '==', session.store_id),
      limit(500)
    );

    const snap = await getDocs(q);
    let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Client-side date filter
    const fromTs = new Date(from + 'T00:00:00').getTime();
    const toTs   = new Date(to   + 'T23:59:59').getTime();
    data = data.filter(r => {
      const ts = r.handover_ts?.toDate ? r.handover_ts.toDate().getTime() : 0;
      return ts >= fromTs && ts <= toTs;
    });

    if (agentId) data = data.filter(r => r.agent_id === agentId);
    if (zoneId)  data = data.filter(r => r.zone_id && r.zone_id.startsWith(zoneId));
    if (search)  data = data.filter(r => r.order_id && r.order_id.includes(search));

    // Sort newest first
    data.sort((a, b) => {
      const ta = a.handover_ts?.toDate ? a.handover_ts.toDate().getTime() : 0;
      const tb = b.handover_ts?.toDate ? b.handover_ts.toDate().getTime() : 0;
      return tb - ta;
    });

    hideLoader();
    renderHistory(data);
    setTimeout(wireHistoryDeleteButtons, 50);
  } catch(e) {
    hideLoader();
    showToast('Error: ' + e.message, 'error');
    console.error(e);
  }
}

function renderHistory(data) {
  const c = document.getElementById('history-list');
  if (!data.length) { c.innerHTML = '<div class="empty-state">No records found</div>'; return; }
  const sBadge = s => s==='Delivered'?'s-delivered':s==='Returned'?'s-returned':'s-handed';
  c.innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">' + data.length + ' records</div>' +
    data.map(r => {
      const ts = r.handover_ts?.toDate ? r.handover_ts.toDate().toLocaleString('en-GB') : '';
      const agentName = (config && config.agentMap && config.agentMap[r.agent_id]) ? config.agentMap[r.agent_id] : r.agent_id;
      // Clean zone label and get color
      const zoneMeta = getZoneMeta(r.zone_id || '');
      const zoneLabel = r.zone_id ? r.zone_id.split('_').slice(0,2).join(' ').replace('zone','Zone').replace(/\b\w/g, c=>c.toUpperCase()) : '';
      return '<div class="history-item" data-id="' + (r.id||r.order_id) + '">' +
        '<div class="history-top">' +
          '<span class="history-id">' + r.order_id + '</span>' +
          '<div style="display:flex;gap:6px;align-items:center">' +
            '<span class="status-badge ' + sBadge(r.status) + '">' + r.status + '</span>' +
            '<button class="btn-delete-order" data-id="' + (r.id||r.order_id) + '" title="Delete">✕</button>' +
          '</div>' +
        '</div>' +
        '<div class="history-meta">👤 ' + agentName + ' · <span class="zone-pill ' + zoneMeta.pill + '" style="font-size:10px;padding:1px 7px">' + zoneLabel + '</span> · 🕐 ' + ts + '<br>By: ' + r.handover_by + '</div>' +
      '</div>';
    }).join('');
}

// Wire up delete buttons after render
function wireHistoryDeleteButtons() {
  document.querySelectorAll('.btn-delete-order').forEach(btn => {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      const docId = this.dataset.id;
      if (!confirm('Delete order ' + docId + '?')) return;
      showLoader('Deleting...');
      try {
        const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        await deleteDoc(doc(db, 'handover_log', docId));
        // Also remove from order_index
        const today = new Date().toISOString().split('T')[0];
        try { await deleteDoc(doc(db, 'order_index', docId.split('_')[0] + '_' + today)); } catch(e) {}
        hideLoader();
        showToast('Order deleted', 'success');
        loadHistory();
      } catch(err) {
        hideLoader();
        showToast('Delete failed: ' + err.message, 'error');
      }
    });
  });
}

async function deleteAllFiltered() {
  const data = window._currentHistoryData || [];
  if (!data.length) return;
  if (!confirm('Delete all ' + data.length + ' filtered records? This cannot be undone.')) return;
  showLoader('Deleting ' + data.length + ' records...');
  try {
    const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    for (const r of data) {
      const docId = r.id || r.order_id;
      await deleteDoc(doc(db, 'handover_log', docId));
    }
    hideLoader();
    showToast('Deleted ' + data.length + ' records', 'success');
    loadHistory();
  } catch(err) {
    hideLoader();
    showToast('Error: ' + err.message, 'error');
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoader(t) { document.getElementById('loader-text').textContent = t; document.getElementById('loader').classList.add('show'); }
function hideLoader()  { document.getElementById('loader').classList.remove('show'); }
function showToast(msg, type = 'info') {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  w.appendChild(t); setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 3200);
}
</script>
